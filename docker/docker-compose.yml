services:

  postgres:
    image: postgres:16
    container_name: ecommerce_postgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ..
      dockerfile: api/Dockerfile
    container_name: ecommerce_api
    depends_on:
      - postgres
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
    ports:
      - "8000:8000"

  dashboard:
    build:
      context: ..
      dockerfile: dashboards/Dockerfile
    container_name: ecommerce_dashboard
    depends_on:
      - api
    ports:
      - "8501:8501"
    volumes:
      - ../data:/app/data
      - ../models:/app/models

volumes:
  postgres_data: